version: '3.8'
# docker-compose -f docker-compose-env.yml -f docker-compose-app.yml up -d
services:
  QA-Agent:
    image: docker.io/system/QA-Agent-app:1.0-SNAPSHOT
    container_name: QA-Agent
    restart: on-failure
    ports:
      - "9090:8091"
    environment:
      - TZ=PRC
      - SERVER_PORT=8091
    volumes:
      - ./log:/data/log
      - ./prompts:/app/docs/prompts
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - my-network

networks:
  my-network:
    driver: bridge