server:
  port: 8091

# MySQL 数据源配置（远程）
spring:
  datasource:
    url: jdbc:mysql://xxx.xxx.xxx.xxx:13306/qa_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: xxx
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  # Kafka 消息队列：异步索引
  kafka:
    bootstrap-servers: xxx.xxx.xxx.xxx:19092
    consumer:
      group-id: qa-agent-indexing
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.block.ms: 3000

# PostgreSQL + pgvector 数据源（RAG 检索引擎）
pg:
  datasource:
    url: jdbc:postgresql://xxx.xxx.xxx.xxx:15432/qa_agent
    username: root
    password: xxx
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

# DeepSeek 作为基础对话模型以及 Embedding 模型
deepSeek:
  model: "deepseek-v4-pro"
  base-url: "https://api.deepseek.com/v1"
  api-key: "xxx"

# 阿里云百炼模型广场
dashScope:
  embedding-model: "text-embedding-v3"
  rerank-model: "gte-rerank-v2"
  base-url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api-key: "xxx"

# Prompt 模板目录（部署时挂载宿主机目录到此处）
prompt:
  base-path: /app/docs/prompts

# JWT 认证配置
jwt:
  secret: "xxx"
  expiration: 7200000  # 2h = 7200000ms

# 日志
logging:
  level:
    cn.pumluda: debug
    dev.langchain4j: debug
    org.apache.kafka.clients.NetworkClient: error
    org.apache.kafka.clients.consumer.internals.ConsumerNetworkClient: error
  config: classpath:logback-spring.xml