server:
  port: 8091

# MySQL 数据源配置（远程）
spring:
  datasource:
    url: jdbc:mysql://134.175.232.110:13306/qa_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
  # Kafka 消息队列：异步索引
  kafka:
    bootstrap-servers: 134.175.232.110:19092
    consumer:
      group-id: qa-agent-indexing
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# PostgreSQL + pgvector 数据源（RAG 检索引擎）
pg:
  datasource:
    url: jdbc:postgresql://134.175.232.110:15432/qa_agent
    username: root
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

# DeepSeek 作为基础对话模型以及 Embedding 模型
deepSeek:
  model: "deepseek-v4-pro"
  base-url: "https://api.deepseek.com/v1"
  api-key: "sk-7416cf0764fa4a89851fc611b4a9eec4"

# 阿里云百炼模型广场
dashScope:
  embedding-model: "text-embedding-v3"
  rerank-model: "gte-rerank-v2"
  base-url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api-key: "sk-b566df923861479284d8d726c681a2a8"

# 日志
logging:
  level:
    cn.pumluda: debug
    dev.langchain4j: debug
  config: classpath:logback-spring.xml